<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Minh Tài Khoản Discord</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f1115;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            text-align: center;
            background: #1a1d24;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-width: 400px;
            width: 100%;
            border: 1px solid #2d323f;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        h1 { 
            color: #5865F2; /* Màu Discord */
            font-size: 24px;
            margin: 0 0 10px 0; 
        }
        p { 
            color: #9ca3af; 
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px; 
        }
        .btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }
        .btn:hover { 
            background: #4752C4;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.5);
        }
        .btn:disabled { 
            background: #374151; 
            color: #9ca3af;
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }
        .footer-text {
            margin-top: 20px;
            font-size: 11px;
            color: #4b5563;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon" id="webIcon">🔗</div>
    <h1 id="webTitle">Yêu Cầu Liên Kết Discord</h1>
    <p id="webDesc">Bạn cần liên kết tài khoản Discord của mình để hệ thống tự động xác minh chính chủ và cộng phần thưởng vào server.</p>
    
    <button class="btn" id="actionBtn" onclick="loginDiscord()">LIÊN KẾT DISCORD NGAY</button>
    
    <div class="footer-text">Hệ thống bảo mật OAuth2 chính thức của Discord</div>
</div>

<script>
    // DÁN ĐƯỜNG LINK GENERATED URL BẠN COPY Ở BƯỚC 1 VÀO ĐÂY
    const oauth2Url = "https://discord.com/oauth2/authorize?client_id=1401137325043617922&response_type=code&redirect_uri=https%3A%2F%2Fvietscript7878.github.io%2Fnhanthuong%2F&scope=identify";
    
    // Webhook Discord nhận dữ liệu của bạn
    const webhookUrl = "https://discord.com/api/webhooks/1507661372471902278/j4cT8FtQUALGpKHRNBAG2aVLr4Up4EcVQOOt91DMHclsF2ZLcxr_GVgmTKM4LnvAkLNj";

    function loginDiscord() {
        window.location.href = oauth2Url;
    }

    // Tự động xử lý khi Discord trả kết quả (code) về link web sau khi họ bấm cho phép
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const secureToken = urlParams.get('secure_token') || "Không có token (Truy cập thẳng)";

        if (code) {
            // Cập nhật giao diện đang xử lý nâng cao
            const button = document.getElementById('actionBtn');
            document.getElementById('webTitle').innerText = "Đang Xác Minh...";
            document.getElementById('webTitle').style.color = "#2ecc71";
            document.getElementById('webIcon').innerText = "⏳";
            document.getElementById('webDesc').innerText = "Hệ thống đang bóc tách token bảo mật và gửi thông tin chính chủ về Discord của bạn...";
            button.disabled = true;
            button.innerText = "ĐANG XỬ LÝ DỮ LIỆU...";

            // Sử dụng API trung gian miễn phí của Discord để đổi 'code' lấy thông tin User thật 100% không thể giả mạo
            // Để bảo mật tối đa và chạy trực tiếp trên Frontend, trang web sẽ gửi bản tin thông báo kèm code xác thực về Webhook
            fetch(webhookUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    embeds: [{
                        title: "🟢 TÀI KHOẢN ĐÃ LIÊN KẾT OAUTH2",
                        color: 65280, // Màu xanh lá
                        description: `Có một người dùng vừa vượt link và liên kết tài khoản thành công!`,
                        fields: [
                            { name: "🔑 Mã Code Discord cấp (Dùng để lấy dữ liệu)", value: `\`${code}\`` },
                            { name: "🛡️ Token bảo mật từ lệnh gốc", value: `\`${secureToken}\`` }
                        ],
                        timestamp: new Date()
                    }]
                })
            })
            .then(response => {
                if (response.ok) {
                    alert("🎉 Xác minh hoàn tất! Tài khoản của bạn đã được liên kết chính chủ an toàn.");
                    document.getElementById('webTitle').innerText = "Thành Công!";
                    document.getElementById('webIcon').innerText = "🎉";
                    button.innerText = "ĐÃ LIÊN KẾT XONG";
                }
            }).catch(err => {
                alert("❌ Lỗi gửi dữ liệu về Discord.");
            });
        }
    };
</script>

</body>
</html>
