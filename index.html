<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Xác Minh Phần Thưởng</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f1115;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            text-align: center;
            background: #1a1d24;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-width: 400px;
            width: 100%;
            border: 1px solid #2d323f;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        h1 { 
            color: #5865F2; 
            font-size: 24px;
            margin: 0 0 10px 0; 
        }
        p { 
            color: #9ca3af; 
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px; 
        }
        .btn {
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }
        /* Màu xanh dương cho nút liên kết */
        .btn-oauth {
            background: #5865F2;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }
        .btn-oauth:hover { background: #4752C4; transform: translateY(-2px); }
        
        /* Màu xanh lá cho nút nhận thưởng trực tiếp */
        .btn-claim {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        .btn-claim:hover { background: #219a52; transform: translateY(-2px); }

        .btn:disabled { 
            background: #374151 !important; 
            color: #9ca3af;
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }
        .footer-text {
            margin-top: 20px;
            font-size: 11px;
            color: #4b5563;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon" id="webIcon">🔗</div>
    <h1 id="webTitle">Quầy Nhận Thưởng</h1>
    <p id="webDesc">Đang kiểm tra trạng thái tài khoản của bạn trên hệ thống...</p>
    
    <button class="btn btn-oauth" id="actionBtn" disabled>ĐANG KIỂM TRA...</button>
    
    <div class="footer-text">Hệ thống đồng bộ dữ liệu chống lạm dụng</div>
</div>

<script>
    const oauth2Url = "https://discord.com/oauth2/authorize?client_id=1401137325043617922&response_type=code&redirect_uri=https%3A%2F%2Fvietscript7878.github.io%2Fnhanthuong%2F&scope=identify";
    const webhookUrl = "https://discord.com/api/webhooks/1507661372471902278/j4cT8FtQUALGpKHRNBAG2aVLr4Up4EcVQOOt91DMHclsF2ZLcxr_GVgmTKM4LnvAkLNj";

    function getParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    const userId = getParam('userid');
    const secureToken = getParam('secure_token') || "Không có token";
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    const button = document.getElementById('actionBtn');
    const title = document.getElementById('webTitle');
    const icon = document.getElementById('webIcon');
    const desc = document.getElementById('webDesc');

    window.onload = function() {
        // Kiểm tra xem trình duyệt này trước đây đã từng liên kết thành công chưa
        const isLinkedBefore = localStorage.getItem(`linked_${userId}`);

        if (code) {
            // TRƯỜNG HỢP 1: Người dùng vừa bấm nút liên kết và được Discord trả về code
            title.innerText = "Đang Lưu Liên Kết...";
            button.innerText = "ĐANG XỬ LÝ...";
            
            // Lưu trạng thái đã liên kết vào máy người dùng để lần sau không cần bắt họ làm lại
            if(userId) localStorage.setItem(`linked_${userId}`, "true");

            sendToWebhook("🟢 TÀI KHOẢN LIÊN KẾT MỚI THÀNH CÔNG", `Mã Code: \`${code}\`\nToken: \`${secureToken}\``, 65280);
        } 
        else if (isLinkedBefore === "true") {
            // TRƯỜNG HỢP 2: Người này ĐÃ TỪNG liên kết rồi -> Đổi thẳng sang nút NHẬN THƯỞNG màu xanh lá!
            icon.innerText = "💰";
            title.innerText = "Tài Khoản Đã Liên Kết!";
            title.style.color = "#2ecc71";
            desc.innerText = "Hệ thống nhận diện bạn đã xác minh chính chủ trước đó. Hãy bấm nút dưới đây để nhận phần thưởng ngay lập tức.";
            
            button.className = "btn btn-claim";
            button.disabled = false;
            button.innerText = "NHẬN THƯỞNG NGAY";
            button.onclick = function() {
                button.disabled = true;
                button.innerText = "ĐANG PHÁT THƯỞNG...";
                sendToWebhook("💰 YÊU CẦU NHẬN THƯỞNG (ĐÃ LIÊN KẾT TRƯỚC ĐÓ)", `Người dùng đã liên kết từ trước, thực hiện nhận thưởng thẳng.\nToken lượt này: \`${secureToken}\``, 1752220);
            };
        } 
        else {
            // TRƯỜNG HỢP 3: Người mới hoàn toàn, chưa từng liên kết
            if (!userId) {
                title.innerText = "Lỗi Đường Link";
                desc.innerText = "Đường link thiếu thông tin bảo mật, vui lòng gõ lệnh lại trên Discord.";
                button.innerText = "LINK KHÔNG HỢP LỆ";
                return;
            }
            icon.innerText = "🔗";
            title.innerText = "Yêu Cầu Liên Kết Discord";
            desc.innerText = "Bạn cần liên kết tài khoản lần đầu để hệ thống xác minh chính chủ chống lạm dụng.";
            button.className = "btn btn-oauth";
            button.disabled = false;
            button.innerText = "LIÊN KẾT DISCORD";
            button.onclick = function() { window.location.href = oauth2Url; };
        }
    };

    function sendToWebhook(typeTitle, details, colorCode) {
        fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                embeds: [{
                    title: typeTitle,
                    color: colorCode,
                    fields: [
                        { name: "👤 Người dùng", value: `<@${userId}>`, inline: true },
                        { name: "🆔 ID Người dùng", value: `\`${userId}\``, inline: true },
                        { name: "ℹ️ Chi tiết", value: details }
                    ],
                    timestamp: new Date()
                }]
            })
        })
        .then(response => {
            if (response.ok) {
                alert("🎉 Hệ thống đã ghi nhận thành công!");
                title.innerText = "Hoàn Thành!";
                icon.innerText = "✨";
                button.innerText = "ĐÃ XỬ LÝ XONG";
            }
        }).catch(err => { alert("❌ Lỗi gửi dữ liệu."); });
    }
</script>

</body>
</html>
